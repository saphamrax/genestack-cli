# Ceph wiring for the openstack namespace: the ceph.conf ConfigMap + RBD keyring
# Secrets. These are NOT helm values, so they go as a PASSTHROUGH manifest:
#
#   cp docs/examples/storage/ceph-secrets.yaml overrides/manifests/storage/ceph-secrets.yaml
#   # fill in the placeholders, then:
#   genestack overrides upload          # uploads to /etc/genestack/manifests/storage/
#   genestack run os.storage --force    # kubectl apply -f that dir, before Glance/Cinder
#
# Collect the values from the Ceph cluster (use the br-storage monitor IPs):
#   fsid:           ssh <mon> cephadm shell "ceph fsid"
#   cinder keyring: ssh <mon> cephadm shell \
#     "ceph auth get-or-create-key client.cinder mon 'profile rbd' \
#      osd 'profile rbd pool=volumes, profile rbd pool=vms, profile rbd-read-only pool=images' \
#      mgr 'profile rbd pool=volumes, profile rbd pool=vms'"
#   glance keyring: ceph auth get-or-create-key client.glance mon 'profile rbd' \
#      osd 'allow class-read object_prefix rbd_children, profile rbd pool=images' mgr 'profile rbd pool=images'
#   data.key fields are base64 of the RAW key:  echo -n "$KEYRING" | base64
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-etc
  namespace: openstack
data:
  ceph.conf: |
    [global]
    cephx = true
    fsid = REPLACE-WITH-CEPH-FSID
    # one [v2:IP:3300/0,v1:IP:6789/0] group per monitor, space-separated:
    mon_host = [v2:172.20.250.51:3300/0,v1:172.20.250.51:6789/0] [v2:172.20.250.52:3300/0,v1:172.20.250.52:6789/0] [v2:172.20.250.53:3300/0,v1:172.20.250.53:6789/0]
---
apiVersion: v1
kind: Secret
metadata:
  name: pvc-ceph-client-key          # referenced by cinder secrets.rbd.* and libvirt user_secret_name
  namespace: openstack
  labels:
    application: ceph
    component: rbd
type: kubernetes.io/rbd
data:
  key: REPLACE-WITH-BASE64-CINDER-KEYRING
---
apiVersion: v1
kind: Secret
metadata:
  name: images-rbd-keyring           # used by the Glance RBD store
  namespace: openstack
type: Opaque
data:
  key: REPLACE-WITH-BASE64-GLANCE-KEYRING
